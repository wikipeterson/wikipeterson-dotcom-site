<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiPeterson</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#faf9f7;overflow:hidden}
.grain{position:fixed;top:0;left:0;width:100%;height:100%;opacity:.03;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:10}
.container{text-align:center;padding:40px;position:relative}
.mark{width:48px;height:48px;margin:0 auto 40px;border:2px solid #1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:24px;font-style:italic;color:#1a1a1a;animation:fadeIn 1s ease both}
h1{font-family:'Instrument Serif',serif;font-size:clamp(42px,8vw,72px);font-weight:400;color:#1a1a1a;letter-spacing:-1.5px;line-height:1.1;animation:fadeIn 1s ease .2s both}
h1 em{font-style:italic;color:#8b7355}
.line{width:40px;height:1px;background:#c4b8a8;margin:28px auto;animation:fadeIn 1s ease .4s both}
p{font-family:'Karla',sans-serif;font-size:15px;font-weight:300;color:#8b8580;letter-spacing:.5px;animation:fadeIn 1s ease .6s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">
<div class="mark">w</div>
<h1>Wiki<em>Peterson</em></h1>
<div class="line"></div>
<p>Something is on its way.</p>
</div>
</body>
</html>
